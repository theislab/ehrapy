name: Run Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    run:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                notebook: [
                        "docs/tutorials/notebooks/ehrapy_introduction.ipynb",
                        "docs/tutorials/notebooks/mimic_2_introduction.ipynb",
                        "docs/tutorials/notebooks/mimic_2_survival_analysis.ipynb",
                        "docs/tutorials/notebooks/mimic_2_fate.ipynb",
                        "docs/tutorials/notebooks/cohort_tracking.ipynb",
                        "docs/tutorials/notebooks/longitudinal_with_ehrapy.ipynb",
                        "docs/tutorials/notebooks/bias.ipynb",
                        # "docs/tutorials/notebooks/mimic_2_causal_inference.ipynb",
                    ]
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: "true"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: "3.14"
                  cache-dependency-glob: pyproject.toml

            - name: Create virtual environment
              run: uv venv

            - name: Install OpenBLAS
              run: sudo apt-get install -y libopenblas-dev

            - name: Install ehrapy and additional dependencies
              run: uv pip install '.[leiden]' 'cellrank[scvelo]' 'numpy>=2.3.2,<2.4' nbconvert ipykernel graphviz pypots fairlearn # numpy pin, upstream: https://github.com/scverse/cellrank/issues/1365

            - name: Install ehrdata from submodule
              run: uv pip install --reinstall --no-deps -e submodules/ehrdata

            - name: Restore datasets cache
              id: data-cache
              uses: actions/cache/restore@v4
              with:
                  path: docs/tutorials/notebooks/ehrapy_data
                  key: ehrapy-data-notebook-${{ matrix.notebook }}-v1

            - name: Run ${{ matrix.notebook }} Notebook
              env:
                  EHRDATA_DOWNLOAD_MAX_RETRIES: "5"
                  EHRDATA_DOWNLOAD_RETRY_DELAY: "10"
              run: uv run --no-sync jupyter nbconvert --to notebook --execute ${{ matrix.notebook }}

            - name: Save datasets cache
              if: steps.data-cache.outputs.cache-hit != 'true' && success()
              uses: actions/cache/save@v4
              with:
                  path: docs/tutorials/notebooks/ehrapy_data
                  key: ehrapy-data-notebook-${{ matrix.notebook }}-v1
